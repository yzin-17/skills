name: Bundle Generator CLIs

on:
  push:
    branches:
      - main
    paths:
      - "packages/openapi-reader/**"
      - "packages/mockoon-gen-cli/**"
      - "packages/api-code-gen-cli/**"
      - "skills/mockoon-gen/**"
      - "skills/api-code-gen/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/bundle-mockoon-gen-cli.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test workspace
        run: pnpm test

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Bundle CLIs
        run: pnpm bundle

      - name: Verify bundled CLIs
        run: |
          node skills/mockoon-gen/bin/mockoon-gen.mjs --version
          node skills/mockoon-gen/bin/mockoon-gen.mjs --help
          node skills/api-code-gen/bin/api-code-gen.mjs --version
          node skills/api-code-gen/bin/api-code-gen.mjs --help

      - name: Validate skills
        run: >-
          node --input-type=module -e 'import { readFile } from "node:fs/promises";
          import { parse } from "./packages/mockoon-gen-cli/node_modules/yaml/dist/index.js";
          const allowed = new Set(["name", "description", "license", "allowed-tools", "metadata"]);
          for (const skill of ["skills/mockoon-gen", "skills/api-code-gen"]) {
            const content = await readFile(`${skill}/SKILL.md`, "utf8");
            const match = content.match(/^---\n(.*?)\n---/s);
            if (!match) throw new Error(`${skill}: invalid YAML frontmatter`);
            const frontmatter = parse(match[1]);
            if (!frontmatter || typeof frontmatter !== "object") throw new Error(`${skill}: frontmatter must be a mapping`);
            for (const key of Object.keys(frontmatter)) if (!allowed.has(key)) throw new Error(`${skill}: unexpected frontmatter key ${key}`);
            if (typeof frontmatter.name !== "string" || !/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(frontmatter.name) || frontmatter.name.length > 64) throw new Error(`${skill}: invalid name`);
            if (typeof frontmatter.description !== "string" || frontmatter.description.length > 1024 || /[<>]/.test(frontmatter.description)) throw new Error(`${skill}: invalid description`);
          }'

      - name: Create or update bundle PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SKILLS_BOT_TOKEN || github.token }}
          branch: automation/mockoon-gen-cli-bundle
          delete-branch: true
          title: "chore: update bundled generator CLIs"
          commit-message: "chore: update bundled generator CLIs"
          body: "This PR updates the bundled generator CLIs used by the installable skills."
          add-paths: |
            skills/mockoon-gen/bin/mockoon-gen.mjs
            skills/api-code-gen/bin/api-code-gen.mjs
